<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Sistema</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="login-page">
  <div class="login-box">
    <h1>Login</h1>
    <form>
      <input type="email" class="form-control" placeholder="Seu email" required />
      <input type="password" class="form-control" placeholder="Senha" required />
      <button type="submit" class="btn">Entrar</button>
    </form>
  </div>
</body>
<script>
  document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault(); // impede o reload padrão

    const email = document.querySelector('input[type="email"]').value;
    const senha = document.querySelector('input[type="password"]').value;

    // Simulação simples de login (só pra testar)
    if (email && senha) {  // verifica se preencheu algo
      window.location.href = 'dashboard.html';  // redireciona
    } else {
      alert('Preencha email e senha!');
    }
  });
</script>
</html>
