{% extends "base.html" %}
{% block title %}Relatórios Gerenciais{% endblock %}

{% block content %}
<h2 class="mb-4">Relatórios Gerenciais - Mês Atual</h2>
<div class="row text-center">
    <div class="col-md-6">
        <div class="card shadow border-primary">
            <div class="card-body">
                <h3>R$ {{ "%.2f"|format(faturamento) }}</h3>
                <p class="text-muted fw-bold">Faturamento do Mês</p>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card shadow border-success">
            <div class="card-body">
                <h3>{{ total_os }}</h3>
                <p class="text-muted fw-bold">Ordens Finalizadas</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
