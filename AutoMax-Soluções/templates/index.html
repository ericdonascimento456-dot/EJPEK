{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="row g-4">
    <div class="col-md-4">
        <div class="card text-center border-primary shadow-sm h-100">
            <div class="card-body">
                <i class="bi bi-people-fill text-primary" style="font-size: 3rem;"></i>
                <h2 class="mt-3">{{ clientes }}</h2>
                <p class="text-muted fw-bold">Clientes Cadastrados</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center border-warning shadow-sm h-100">
            <div class="card-body">
                <i class="bi bi-tools text-warning" style="font-size: 3rem;"></i>
                <h2 class="mt-3">{{ os_abertas }}</h2>
                <p class="text-muted fw-bold">OS Abertas</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center border-danger shadow-sm h-100">
            <div class="card-body">
                <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
                <h2 class="mt-3">{{ alertas_estoque }}</h2>
                <p class="text-muted fw-bold">Alertas de Estoque</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
