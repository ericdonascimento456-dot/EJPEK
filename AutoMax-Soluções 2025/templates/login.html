<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - AutoMax</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea, #764ba2); height: 100vh; }
        .login-box { max-width: 400px; margin: auto; padding-top: 10vh; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="card shadow">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">AutoMax Oficina</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Login</label>
                        <input type="text" name="login" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" name="senha" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
                <hr>
                <small class="text-muted">
                    Teste: antonio/123 (Gerente) | luciana/123 (Recepcionista) | jonas/123 (Mecânico)
                </small>
            </div>
        </div>
    </div>
</body>
</html>
