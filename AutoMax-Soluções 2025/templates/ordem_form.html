{% extends "base.html" %}
{% block title %}Nova Ordem de Serviço{% endblock %}

{% block content %}
<h2 class="mb-4">Nova Ordem de Serviço</h2>
<div class="card shadow">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Cliente</label>
                    <select name="id_cliente" class="form-select" required>
                        <option value="">Selecione o cliente</option>
                        {% for c in clientes %}
                        <option value="{{ c.id_cliente }}" 
                                {% if request.form.id_cliente == c.id_cliente|string %}selected{% endif %}>
                            {{ c.nome }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Veículo</label>
                    <select name="id_veiculo" class="form-select" required>
                        <option value="">Selecione o veículo</option>
                        {% for v in veiculos %}
                            {% if request.form.id_cliente == v.id_cliente|string or not request.form.id_cliente %}
                            <option value="{{ v.id_veiculo }}"
                                    {% if request.form.id_veiculo == v.id_veiculo|string %}selected{% endif %}>
                                {{ v.placa }} - {{ v.modelo }} {{ v.marca }}
                            </option>
                            {% endif %}
                        {% endfor %}
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label fw-bold">Diagnóstico</label>
                    <textarea name="diagnostico" class="form-control" rows="4" required>{{ request.form.diagnostico }}</textarea>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Prazo Previsto</label>
                    <input type="date" name="prazo_previsto" class="form-control" 
                           value="{{ request.form.prazo_previsto }}" required>
                </div>
            </div>

            <hr class="my-5">
            <button type="submit" class="btn btn-success btn-lg px-5">Abrir OS</button>
            <a href="{{ url_for('ordens') }}" class="btn btn-secondary btn-lg px-5">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
