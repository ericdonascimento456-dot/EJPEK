{% extends "base.html" %}
{% block title %}{{ acao }}{% endblock %}

{% block content %}
<h2 class="mb-4">{{ acao }}</h2>
<div class="card shadow">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Código</label>
                    <input type="text" name="codigo" class="form-control" value="{{ peca.codigo if peca else '' }}" required>
                </div>
                <div class="col-md-9">
                    <label class="form-label">Descrição</label>
                    <input type="text" name="descricao" class="form-control" value="{{ peca.descricao if peca else '' }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Preço Custo (R$)</label>
                    <input type="number" step="0.01" name="preco_custo" class="form-control" value="{{ peca.preco_custo if peca else '' }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Preço Venda (R$)</label>
                    <input type="number" step="0.01" name="preco_venda" class="form-control" value="{{ peca.preco_venda if peca else '' }}" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Estoque Atual</label>
                    <input type="number" name="estoque_atual" class="form-control" value="{{ peca.estoque_atual|default(0) }}" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Estoque Mínimo</label>
                    <input type="number" name="estoque_minimo" class="form-control" value="{{ peca.estoque_minimo|default(5) }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Fornecedor</label>
                    <input type="text" name="fornecedor" class="form-control" value="{{ peca.fornecedor if peca else '' }}">
                </div>
            </div>
            <hr class="my-4">
            <button type="submit" class="btn btn-success btn-lg">Salvar Peça</button>
            <a href="{{ url_for('pecas') }}" class="btn btn-secondary btn-lg">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
