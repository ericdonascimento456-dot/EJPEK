{% extends "base.html" %}
{% block title %}{{ acao }}{% endblock %}

{% block content %}
<h2 class="mb-4">{{ acao }}</h2>
<div class="card shadow">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" name="nome" class="form-control" value="{{ cliente.nome if cliente else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">CPF</label>
                    <input type="text" id="cpf" name="cpf" class="form-control" 
                           value="{{ cliente.cpf if cliente else '' }}" 
                           placeholder="000.000.000-00" maxlength="14" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Celular</label>
                    <input type="text" id="celular" name="celular" class="form-control" 
                           value="{{ cliente.celular if cliente else '' }}" 
                           placeholder="(00) 00000-0000" maxlength="15" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control" value="{{ cliente.email if cliente else '' }}">
                </div>
            </div>
            <hr class="my-4">
            <button type="submit" class="btn btn-success btn-lg">Salvar Cliente</button>
            <a href="{{ url_for('clientes') }}" class="btn btn-secondary btn-lg">Cancelar</a>
        </form>
    </div>
</div>

<!-- JavaScript puro (sem bibliotecas) -->
<script>
function mascaraCPF(i) {
    let v = i.value.replace(/\D/g, '');
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
    i.value = v;
}

function mascaraCelular(i) {
    let v = i.value.replace(/\D/g, '');
    v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
    if (v.length <= 14) {
        v = v.replace(/(\d{4})(\d)/, '$1-$2');
    } else {
        v = v.replace(/(\d{5})(\d)/, '$1-$2');
    }
    i.value = v;
}

document.addEventListener('DOMContentLoaded', function () {
    const cpf = document.getElementById('cpf');
    const cel = document.getElementById('celular');
    
    if (cpf) {
        mascaraCPF(cpf);
        cpf.addEventListener('input', () => mascaraCPF(cpf));
    }
    if (cel) {
        mascaraCelular(cel);
        cel.addEventListener('input', () => mascaraCelular(cel));
    }
});
</script>
{% endblock %}
